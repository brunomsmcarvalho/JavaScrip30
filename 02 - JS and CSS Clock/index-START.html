<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS + CSS Clock</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>


    <div class="clock">
      <div class="clock-face">
        <div class="hand hour-hand"></div>
        <div class="hand min-hand"></div>
        <div class="hand second-hand"></div>
      </div>
    </div>


  <style>
    html {
      background: #018DED url(https://unsplash.it/1500/1000?image=881&blur=5);
      background-size: cover;
      font-family: 'helvetica neue';
      text-align: center;
      font-size: 10px;
    }

    body {
      margin: 0;
      font-size: 2rem;
      display: flex;
      flex: 1;
      min-height: 100vh;
      align-items: center;
    }

    .clock {
      width: 30rem;
      height: 30rem;
      border: 20px solid white;
      border-radius: 50%;
      margin: 50px auto;
      position: relative;
      padding: 2rem;
      box-shadow:
        0 0 0 4px rgba(0,0,0,0.1),
        inset 0 0 0 3px #EFEFEF,
        inset 0 0 10px black,
        0 0 10px rgba(0,0,0,0.2);
    }

    .clock-face {
      position: relative;
      width: 100%;
      height: 100%;
      transform: translateY(-3px); /* account for the height of the clock hands */
    }

    .hand {
      
      height: 6px;
      background: black; /* color of the clock hands */
      position: absolute; /* position the hand absolutely within the clock face */
      top: 50%; /* position the hand at the center of the clock face vertically */
      transform-origin: 100%; /* set the transform origin to the end of the hand so it rotates around that point */
      transform: rotate(90deg); /* set the initial position of the clock hands to 12 o'clock */
      transition: all 0.05s; /* smooth transition for the clock hands when they move */
      transition-timing-function: cubic-bezier(0.83, 0.17, 0, 3.88); /* dd a nice bounce effect to the clock hands when they move */
    }
    .hand.hour-hand {
      width: 30%; /* make the hour hand shorter than the minute and second hands */
      left: 20%; /* position the hour hand slightly to the left of the center */
      height: 8px; /* make the hour hand thicker than the minute and second hands */

    }

    .hand.min-hand {
      width: 40%; /* make the minute hand shorter than the second hand */
      left: 10%; /* position the minute hand slightly to the left of the center */
    }
    .hand.second-hand {
      width: 50%; /* make the second hand the longest */
      transition-property: all;/* specify that all properties should transition when they change */
      transition-duration: 0.05s; /* set the duration of the transition to 0.05 seconds */
      transition-timing-function: cubic-bezier(0.83, 0.17, 0, 3.88); /* dd a nice bounce effect to the clock hands when they move */
    }

  </style>

  <script>
  const secondHand = document.querySelector('.second-hand'); // select the second hand element
  const minsHand = document.querySelector('.min-hand'); // select the minute hand element
  const hourHand = document.querySelector('.hour-hand'); // select the hour hand element  
  
  function setDate() {
    
    const now = new Date(); // create a new Date object to get the current time
    
    const seconds = now.getSeconds();
    if (seconds === 0) {
      secondHand.style.transition = 'none'; // remove the transition for a smooth start
    } else {
      secondHand.style.transition = ''; // use the CSS transition again
    }
    const secondsDegrees = ((seconds / 60) * 360) + 90;
    secondHand.style.transform = `rotate(${secondsDegrees}deg)`;
    
    const mins = now.getMinutes();
    if (mins === 0) {
      minsHand.style.transition = 'none'; // remove the transition for a smooth start
    } else {
      minsHand.style.transition = ''; // use the CSS transition again
    }

    const minsDegrees = ((mins / 60) * 360) + 90; // convert the minutes to a degree value (0-360) and add 90 to account for the initial position of the hand
    minsHand.style.transform = `rotate(${minsDegrees}deg)`; // set the transform style of the minute hand to rotate it to the correct position


    const hour = now.getHours(); 
    const hourDegrees = ((hour / 12) * 360) + 90;// convert the hour to a degree value (0-360) and add 90 to account for the initial position of the hand
    if (hour === 0) {
      hourHand.style.transition = 'none'; // remove the transition for a smooth start
    } else {
      hourHand.style.transition = ''; // use the CSS transition again
    }
    hourHand.style.transform = `rotate(${hourDegrees}deg)`;// set the transform style of the hour hand to rotate it to the correct position
    
  }
    
  setInterval(setDate, 1000); // call the setDate function every second to update the clock hands
  setDate(); // call the setDate function once to set the initial position of the clock hands

  </script>
</body>
</html>
